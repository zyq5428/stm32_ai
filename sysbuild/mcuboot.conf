# mcuboot.conf — MCUboot Kconfig 配置
# 串口升级方案（无按键）: 应用层 mcumgr 上传固件到 slot1 → 标记 pending → 重启 → MCUboot 覆写升级
# slot1 在外部 NOR Flash (W25Q128), QSPI 仅用 indirect 模式（不开 MEMMAP, 避免与 XIP 冲突）

# === 串口恢复模式（应急恢复通道） ===
CONFIG_MCUBOOT_SERIAL=y
CONFIG_BOOT_SERIAL_UART=y
# 禁用 UART 控制台（USART1 专用于 mcumgr 串口恢复协议）
CONFIG_UART_CONSOLE=n

# ★ 不使用 GPIO 按键 — 升级由应用层 mcumgr 触发，不靠按键+复位
# CONFIG_BOOT_SERIAL_ENTRANCE_GPIO is not set

# === 无有效应用程序时自动进入串口恢复（防砖保护） ===
CONFIG_BOOT_SERIAL_NO_APPLICATION=y

# === 签名算法 RSA-2048 ===
CONFIG_BOOT_SIGNATURE_TYPE_RSA=y
CONFIG_BOOT_SIGNATURE_TYPE_RSA_LEN=2048

# === 项目专用签名密钥 — 在 stm32_ai/sysbuild.conf 中用 SB_CONFIG_BOOT_SIGNATURE_KEY_FILE 配置 ===

# === 最大镜像扇区数（AUTO 自动计算） ===
CONFIG_BOOT_MAX_IMG_SECTORS_AUTO=y

# ★ QSPI NOR Flash — 仅 indirect 模式（普通读/写/擦除指令），不开 MEMMAP
# 原因: STM32L4 QUADSPI 只有一套控制逻辑, indirect 和 memory-mapped 模式互斥
# MCUboot 通过 flash_read/flash_write/flash_erase 操作 slot1, indirect 模式完全满足需求
CONFIG_FLASH_STM32_QSPI=y
# CONFIG_STM32_MEMMAP is not set  ← ★ 关键：不开 memory-mapped 模式
CONFIG_DMA=y
