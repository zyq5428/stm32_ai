# mcuboot.conf — MCUboot Kconfig 配置
# 启用 USART1 串口恢复（mcumgr SMP 协议）+ KEY0 (PD10) GPIO 按键检测进入

# === 串口恢复模式 ===
CONFIG_MCUBOOT_SERIAL=y
CONFIG_BOOT_SERIAL_UART=y
# 禁用 UART 控制台（避免与串口恢复冲突，USART1 专用于 mcumgr 恢复模式）
CONFIG_UART_CONSOLE=n

# === GPIO 按键检测进入串口恢复 ===
CONFIG_BOOT_SERIAL_ENTRANCE_GPIO=y
# 按键消抖/检测延时 50ms
CONFIG_BOOT_SERIAL_DETECT_DELAY=50

# === 无有效应用程序时自动进入串口恢复 ===
CONFIG_BOOT_SERIAL_NO_APPLICATION=y

# === 日志级别（警告级别节省空间） ===
CONFIG_MCUBOOT_LOG_LEVEL_WRN=y

# === 签名算法 RSA-2048 ===
CONFIG_BOOT_SIGNATURE_TYPE_RSA=y
CONFIG_BOOT_SIGNATURE_TYPE_RSA_LEN=2048

# === 项目专用签名密钥 — 请在 stm32_ai/sysbuild.conf 中配置 SB_CONFIG_BOOT_SIGNATURE_KEY_FILE ===
# （sysbuild 级配置自动写入 MCUboot 子镜像）

# === 最大镜像扇区数 — NOR Flash 扇区(4KB)比内部 Flash(2KB)大, 需要更多扇区 ===
# 448KB slot / 2KB sector = 224 sectors (slot0 内部Flash)
# 448KB slot / 4KB sector = 112 sectors (slot1 NOR Flash)
# AUTO 会自动计算合适的值
CONFIG_BOOT_MAX_IMG_SECTORS_AUTO=y

# === QSPI NOR Flash 驱动 (W25Q128) — MCUboot 需要直接访问 slot1 ===
CONFIG_FLASH_STM32_QSPI=y
CONFIG_STM32_MEMMAP=y
CONFIG_DMA=y
