# prj.conf - STM32 AI 应用 Kconfig 配置
#
# 架构说明:
#   - USART1 (PA9/PA10): 应用 Shell/日志 + MCUboot 串口恢复（分时复用）
#   - Shell 提供交互式命令行，日志通过 Shell 后端输出
#   - mcumgr SMP 通过 Shell 传输层共存，不与日志冲突

# 启用 GPIO 驱动（LED 控制需要）
CONFIG_GPIO=y

# 启用日志子系统（main.c 和线程文件中使用 LOG_INF/LOG_ERR）
CONFIG_LOG=y

# === Shell 交互式命令行 ===
CONFIG_SHELL=y

# === STM32 内部 Flash 驱动（MCUMGR_GRP_IMG 完整依赖链） ===
CONFIG_FLASH=y
CONFIG_SOC_FLASH_STM32=y
CONFIG_FLASH_MAP=y          # Flash 分区映射（MCUBOOT_IMG_MANAGER 依赖）
CONFIG_STREAM_FLASH=y       # 流式 Flash 写入（IMG_MANAGER 依赖）
CONFIG_IMG_MANAGER=y
# MCUBOOT_IMG_MANAGER 为默认选项 → 选 MCUBOOT_BOOTUTIL_LIB → 提供 bootutil 头文件

# === mcumgr SMP 协议 — 通过 Shell 传输层（与日志/Shell 共用 USART1，无冲突） ===
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_BASE64=y
CONFIG_CRC=y
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_SHELL=y
# 镜像管理（查看/上传固件到 slot1）
CONFIG_MCUMGR_GRP_IMG=y
# 系统管理（复位、回显等）
CONFIG_MCUMGR_GRP_OS=y
# Shell 管理（通过 mcumgr 远程执行 Shell 命令）
CONFIG_MCUMGR_GRP_SHELL=y
