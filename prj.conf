# prj.conf - STM32 AI 应用 Kconfig 配置
#
# 架构说明:
#   - USART1 (PA9/PA10): 应用 Shell/日志 + MCUboot 串口恢复（分时复用）
#   - Shell 提供交互式命令行，日志通过 Shell 后端输出
#   - mcumgr SMP 通过 Shell 传输层共存，不与日志冲突

# 启用 GPIO 驱动（LED 控制需要）
CONFIG_GPIO=y

# 启用 I2C 驱动（传感器通信需要）
CONFIG_I2C=y
CONFIG_I2C_GPIO=y

# 启用 SPI 驱动（LCD ST7789V 通信需要）
CONFIG_SPI=y

# 启用传感器子系统（传感器驱动依赖）
CONFIG_SENSOR=y

# === 显示子系统 (Zephyr内置ST7789V + MIPI-DBI-SPI) ===
CONFIG_DISPLAY=y
CONFIG_ST7789V=y
CONFIG_MIPI_DBI=y

# === LVGL 图形库 ===
CONFIG_LVGL=y
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_Z_BITS_PER_PIXEL=16
CONFIG_LV_Z_VDB_SIZE=10
CONFIG_LV_Z_MEM_POOL_SIZE=16384
# ★ RGB565 字节交换 (STM32小端 → ST7789V大端)
CONFIG_LV_COLOR_16_SWAP=y
CONFIG_LV_USE_THEME_DEFAULT=y
CONFIG_LV_THEME_DEFAULT_DARK=y
CONFIG_LV_USE_LABEL=y
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_MONTSERRAT_16=y
CONFIG_LV_FONT_MONTSERRAT_20=y

# 启用日志子系统（main.c 和线程文件中使用 LOG_INF/LOG_ERR）
CONFIG_LOG=y

# === Shell 交互式命令行 ===
CONFIG_SHELL=y

# === STM32 Flash 驱动（内部 + 外部 NOR Flash） ===
CONFIG_FLASH=y
CONFIG_SOC_FLASH_STM32=y
CONFIG_FLASH_MAP=y          # Flash 分区映射（MCUBOOT_IMG_MANAGER 依赖）
CONFIG_STREAM_FLASH=y       # 流式 Flash 写入（IMG_MANAGER 依赖）
CONFIG_IMG_MANAGER=y
# ★ 外部 NOR Flash W25Q128 (QSPI) — slot1 存储
CONFIG_FLASH_STM32_QSPI=y
# STM32 内存映射模式 — 允许直接访问外部 Flash
CONFIG_STM32_MEMMAP=y
# DMA — QSPI 驱动依赖
CONFIG_DMA=y
# MCUBOOT_IMG_MANAGER 为默认选项 → 选 MCUBOOT_BOOTUTIL_LIB → 提供 bootutil 头文件

# === mcumgr SMP 协议 — 通过 Shell 传输层（与日志/Shell 共用 USART1，无冲突） ===
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_BASE64=y
CONFIG_CRC=y
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_SHELL=y
# 镜像管理（查看/上传固件到 slot1）
CONFIG_MCUMGR_GRP_IMG=y
# 系统管理（复位、回显等）
CONFIG_MCUMGR_GRP_OS=y
# Shell 管理（通过 mcumgr 远程执行 Shell 命令, 需要 SHELL_BACKEND_DUMMY）
# CONFIG_MCUMGR_GRP_SHELL=y
CONFIG_SHELL_BACKEND_DUMMY=y
