# sysbuild.conf — Sysbuild 多镜像构建配置
# 启用 MCUboot 作为二级引导程序，采用 Overwrite-Only 模式

SB_CONFIG_BOOTLOADER_MCUBOOT=y
SB_CONFIG_MCUBOOT_MODE_OVERWRITE_ONLY=y

# 项目专用 RSA-2048 签名密钥（sysbuild 级配置，会写入 MCUboot 子镜像的 .config.sysbuild）
SB_CONFIG_BOOT_SIGNATURE_KEY_FILE="E:/zephyrproject/stm32_ai/root-rsa-2048.pem"
